<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}NewsNest{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0f;
        --surface: #13131a;
        --surface2: #1a1a24;
        --border: #2a2a3a;
        --accent: #6c63ff;
        --accent2: #ff6584;
        --text: #e8e8f0;
        --muted: #6b6b80;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
      }
      .navbar {
        background: rgba(13, 13, 26, 0.95) !important;
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        padding: 12px 0;
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .navbar-brand {
        font-weight: 800;
        font-size: 1.4rem;
        background: linear-gradient(135deg, #6c63ff, #ff6584);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.5px;
      }
      .search-box {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 50px;
        padding: 8px 20px;
        color: var(--text);
        width: 280px;
        font-size: 0.85rem;
        transition: all 0.3s;
      }
      .search-box:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
        width: 320px;
      }
      .search-box::placeholder {
        color: var(--muted);
      }
      .nav-btn {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 50px;
        padding: 7px 16px;
        font-size: 0.82rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .nav-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .nav-btn.danger:hover {
        border-color: var(--accent2);
        color: var(--accent2);
      }
      .categories-bar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 12px 0;
        overflow-x: auto;
        white-space: nowrap;
      }
      .cat-btn {
        display: inline-block;
        padding: 6px 18px;
        border-radius: 50px;
        font-size: 0.82rem;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        color: var(--muted);
        border: 1px solid transparent;
        margin: 0 4px;
        transition: all 0.2s;
      }
      .cat-btn:hover {
        color: var(--text);
        border-color: var(--border);
      }
      .cat-btn.active {
        background: linear-gradient(135deg, #6c63ff, #ff6584);
        color: white;
        border-color: transparent;
      }
      .news-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        transition: all 0.3s;
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .news-card:hover {
        border-color: var(--accent);
        transform: translateY(-4px);
        box-shadow: 0 20px 40px rgba(108, 99, 255, 0.15);
      }
      .news-img {
        width: 100%;
        height: 180px;
        object-fit: cover;
      }
      .news-img-placeholder {
        width: 100%;
        height: 180px;
        background: linear-gradient(135deg, var(--surface2), var(--border));
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 2rem;
      }
      .card-body {
        padding: 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .source-badge {
        display: inline-block;
        background: rgba(108, 99, 255, 0.15);
        color: var(--accent);
        border: 1px solid rgba(108, 99, 255, 0.3);
        border-radius: 50px;
        padding: 3px 10px;
        font-size: 0.72rem;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .card-title {
        font-size: 0.88rem;
        font-weight: 600;
        line-height: 1.5;
        color: var(--text);
        flex: 1;
        margin-bottom: 14px;
      }
      .card-footer-btns {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: auto;
      }
      .read-btn {
        background: linear-gradient(135deg, #6c63ff, #ff6584);
        color: white;
        border: none;
        border-radius: 50px;
        padding: 6px 16px;
        font-size: 0.78rem;
        font-weight: 600;
        text-decoration: none;
        transition: opacity 0.2s;
      }
      .read-btn:hover {
        opacity: 0.85;
        color: white;
      }
      .bookmark-btn {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 50px;
        padding: 6px 12px;
        font-size: 0.78rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .bookmark-btn:hover,
      .bookmark-btn.saved {
        background: rgba(255, 101, 132, 0.15);
        border-color: var(--accent2);
        color: var(--accent2);
      }
      /* Dark/Light Mode */
      body.light-mode {
        --bg: #f8f9ff;
        --surface: #ffffff;
        --surface2: #f0f0f8;
        --border: #e0e0f0;
        --text: #1a1a2e;
        --muted: #6b6b80;
      }
      .theme-btn {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 50px;
        padding: 7px 14px;
        font-size: 0.82rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .theme-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .alert {
        border-radius: 12px;
        border: none;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="{% url 'home' %}">
          <i
            class="fas fa-satellite-dish me-2"
            style="-webkit-text-fill-color: #6c63ff"
          ></i
          >NewsNest
        </a>
        <div class="d-flex align-items-center gap-2 flex-wrap">
          {% if user.is_authenticated %}
          <form class="d-flex" action="{% url 'search' %}" method="get">
            <input
              type="text"
              name="q"
              placeholder="Search news..."
              class="search-box me-2"
              value="{{ request.GET.q }}"
            />
            <button type="submit" style="display: none"></button>
          </form>

          <!-- Dark/Light Mode Toggle -->
          <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
            🌙 Dark
          </button>

          <a href="{% url 'bookmarks' %}" class="nav-btn">
            <i class="fas fa-bookmark"></i> Saved
          </a>
          <a href="{% url 'profile' %}" class="nav-btn">
            <i class="fas fa-user"></i> {{ user.username }}
          </a>
          <a href="{% url 'logout' %}" class="nav-btn danger">
            <i class="fas fa-sign-out-alt"></i>
          </a>
          {% endif %}
        </div>
      </div>
    </nav>

    <div class="container-fluid px-4 mt-4">
      {% for m in messages %}
      <div class="alert alert-info alert-dismissible fade show">
        {{ m }}
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      {% endfor %} {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function toggleTheme() {
        document.body.classList.toggle("light-mode");
        const btn = document.getElementById("themeBtn");
        if (document.body.classList.contains("light-mode")) {
          btn.innerHTML = "☀️ Light";
          localStorage.setItem("theme", "light");
        } else {
          btn.innerHTML = "🌙 Dark";
          localStorage.setItem("theme", "dark");
        }
      }

      // Remember theme on page load
      window.onload = function () {
        if (localStorage.getItem("theme") === "light") {
          document.body.classList.add("light-mode");
          document.getElementById("themeBtn").innerHTML = "☀️ Light";
        }
      };
    </script>
  </body>
</html>
