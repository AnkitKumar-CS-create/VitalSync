# Server Configuration
server.port=8080
spring.application.name=vitalsync-backend

# Database Configuration (VitalSync Specific)
spring.datasource.url=jdbc:postgresql://localhost:5432/vitalsync
spring.datasource.username=ankitkumar
spring.datasource.password=
# Note: Agar tumne password rakha hai toh yahan likhna, varna khali chhod do.

# Hibernate/JPA Settings
# Isko 'update' rakho taaki data delete na ho
spring.jpa.hibernate.ddl-auto=update

# --- LOG CLEANING (No more confusing SQL kachra) ---
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# Jackson Fix for LocalDateTime (Optional but good practice)
spring.jackson.serialization.write-dates-as-timestamps=false

# CORS Config (Just in case)
spring.mvc.converters.preferred-json-mapper=jackson